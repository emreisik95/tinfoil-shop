name: Auto-Update Tinfoil Shop

on:
  schedule:
    # Her gün saat 00:00'da çalış
    - cron: '0 0 * * *'
  workflow_dispatch: # Manuel tetikleme

jobs:
  update-shop:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Update shop
      run: python auto_update_shop.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add emre_ultimate_shop.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update shop - $(date '+%Y-%m-%d %H:%M')"
        git push

    - name: Create summary
      run: |
        echo "## 🎮 Shop Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Updated: $(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Total games: $(python -c 'import json; print(f"{len(json.load(open(\"emre_ultimate_shop.json\"))[\"files\"]):,}")')" >> $GITHUB_STEP_SUMMARY
